meta:
  org_name: "Poolula LLC"
  prepared_for: "Internal use / chatbot evaluation / accounting workpapers"
  last_updated: "2025-10-26"
  notes: >
    This file is the ONLY source of truth for downstream generated Q&A. If it's
    not in here, the model should say 'not documented' instead of hallucinating.

